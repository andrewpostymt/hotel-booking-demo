name: Postman Bootstrap

on:
  workflow_dispatch:
    inputs:
      project-name:
        description: 'Service project name'
        required: true
        default: 'recommendation-service'
      spec-url:
        description: 'OpenAPI spec URL (must be HTTPS)'
        required: true
        default: 'https://raw.githubusercontent.com/andrewpostymt/hotel-booking-demo/main/recommendation-service.openapi.yaml'

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: bootstrap
        uses: postman-cs/postman-bootstrap-action@v0
        with:
          project-name: ${{ github.event.inputs.project-name }}
          spec-url: ${{ github.event.inputs.spec-url }}
          workspace-id: 8efae25c-c592-46ce-89f7-7102faef61e8
          domain: booking-services
          domain-code: RBS
          governance-mapping-json: '{"booking-services":"Booking Services"}'
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}

      - name: Print bootstrap outputs
        run: |
          echo "workspace-id: ${{ steps.bootstrap.outputs.workspace-id }}"
          echo "spec-id: ${{ steps.bootstrap.outputs.spec-id }}"
          echo "baseline-collection-id: ${{ steps.bootstrap.outputs.baseline-collection-id }}"
          echo "smoke-collection-id: ${{ steps.bootstrap.outputs.smoke-collection-id }}"
          echo "contract-collection-id: ${{ steps.bootstrap.outputs.contract-collection-id }}"
          echo "collections-json: ${{ steps.bootstrap.outputs.collections-json }}"
