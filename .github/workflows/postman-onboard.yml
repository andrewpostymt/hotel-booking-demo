name: Postman API Onboarding

on:
  workflow_dispatch:
    inputs:
      project-name:
        description: 'Service project name'
        required: true
        default: 'room-booking-core-services'
      spec-url:
        description: 'OpenAPI spec URL (must be HTTPS)'
        required: true
        default: 'https://raw.githubusercontent.com/andrewpostymt/hotel-booking-demo/main/room-booking-core-services.openapi.yaml'

permissions:
  contents: write
  actions: write

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: postman-cs/postman-api-onboarding-action@v0
        with:
          project-name: ${{ github.event.inputs.project-name }}
          spec-url: ${{ github.event.inputs.spec-url }}
          workspace-id: 8efae25c-c592-46ce-89f7-7102faef61e8
          spec-id: 5a2077f5-c00f-4669-a708-7d56e53ba95e
          baseline-collection-id: '54514825-258e4ab7-a6b1-47b3-bb30-4c53d687a892'
          smoke-collection-id: '54514825-eb3723d1-266c-4508-8180-6a992699f24a'
          contract-collection-id: '54514825-15056d72-1d67-487c-ab92-8d846bdcfdb8'
          domain: booking-services
          domain-code: RBS
          governance-mapping-json: '{"booking-services":"Booking Services"}'
          environments-json: '["dev","qa2","qa4","preprod","nonprod-dev","nonprod-qa","nonprod-stage","nonprod-preprod"]'
          generate-ci-workflow: false
          repo-write-mode: commit-and-push
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
