$kind: http-example
request:
  url: "{{baseUrl}}/health"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": "healthy",
        "version": "1.4.2",
        "dependencies": {
          "recommendation_engine": "healthy",
          "inventory_cache": "healthy",
          "pricing_feed": "healthy"
        },
        "timestamp": "2026-04-29T14:00:00Z"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "status": {
            "type": "string",
            "enum": [
              "healthy",
              "degraded",
              "unhealthy"
            ],
            "description": "Overall service health status"
          },
          "version": {
            "type": "string",
            "example": "1.4.2",
            "description": "Deployed service version"
          },
          "dependencies": {
            "type": "object",
            "description": "Health status of downstream dependencies"
          },
          "timestamp": {
            "type": "string",
            "description": "UTC timestamp of the health check response",
            "format": "date-time"
          }
        },
        "required": [
          "status",
          "timestamp"
        ]
      }
order: 1000
