$kind: http-request
description: |
  Applies configuration overrides to the live recommendation engine.
  Changes take effect within 60 seconds across all instances. Use to adjust
  offer weightings, toggle property-level features, or set blackout windows
  without a deployment.
url: "{{baseUrl}}/recommendations/configuration"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "offerWeights": {
        "entertainment": 0.8,
        "dining": 0.5,
        "resort_package": 0.6
      },
      "blackoutDates": [],
      "propertyOverrides": {
        "ARIA": {
          "showsOnlyEnabled": true
        }
      }
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "offerWeights": {
          "type": "object",
          "properties": {
            "entertainment": {
              "type": "number",
              "minimum": 0,
              "maximum": 1,
              "format": "float"
            },
            "dining": {
              "type": "number",
              "minimum": 0,
              "maximum": 1,
              "format": "float"
            },
            "resort_package": {
              "type": "number",
              "minimum": 0,
              "maximum": 1,
              "format": "float"
            }
          }
        },
        "blackoutDates": {
          "type": "array",
          "items": {
            "type": "string",
            "format": "date"
          }
        },
        "propertyOverrides": {
          "type": "object"
        }
      }
    }
examples: ./.resources/Update recommendation engine configuration.resources/examples
order: 2000
