$kind: http-request
url: https://secretsmanager.{{AWS_REGION}}.amazonaws.com
method: POST
headers:
  X-Amz-Target: secretsmanager.GetSecretValue
  Content-Type: application/x-amz-json-1.1
body:
  type: text
  content: '{"SecretId": "{{AWS_SECRET_NAME}}"}'
auth:
  type: awsv4
  credentials:
    - key: accessKey
      value: '{{AWS_ACCESS_KEY_ID}}'
      type: string
    - key: secretKey
      value: '{{AWS_SECRET_ACCESS_KEY}}'
      type: string
    - key: region
      value: '{{AWS_REGION}}'
      type: string
    - key: service
      value: secretsmanager
      type: string
scripts:
  - type: afterResponse
    code:
      - if (pm.environment.get("CI") === "true") { return; }
      - const body = pm.response.json();
      - if (body.SecretString) {
      - '  const secrets = JSON.parse(body.SecretString);'
      - '  Object.entries(secrets).forEach(([k, v]) => pm.collectionVariables.set(k, v));'
      - '}'
    language: text/javascript
