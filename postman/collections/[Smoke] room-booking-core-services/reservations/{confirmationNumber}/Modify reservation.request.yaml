type: http
name: Modify reservation
url: '{{baseUrl}}/reservations/:confirmationNumber'
method: PUT
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: confirmationNumber
    value: HOTEL-2026-884421
    description: Reservation confirmation number returned at booking time.
body:
  type: json
  content: |-
    {
      "checkIn": "1952-08-16",
      "checkOut": "1992-11-22",
      "roomTypeCode": "string",
      "guests": {
        "adults": 7556,
        "children": 6813
      },
      "addOns": [
        {
          "code": "RESORT-FEE",
          "description": "string",
          "amount": 5352.360493796484
        },
        {
          "code": "RESORT-FEE",
          "description": "string",
          "amount": 7607.971376417264
        }
      ],
      "specialRequests": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "confirmationNumber": "string",
            "status": "PENDING",
            "propertyId": "string",
            "roomTypeCode": "string",
            "checkIn": "2004-04-25",
            "checkOut": "1994-03-08",
            "totalDue": 5296.542818577592,
            "createdAt": "1983-02-25T12:58:49.188Z",
            "modifiedAt": "2020-02-24T05:47:14.997Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Reservation modified successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "INVALID_REQUEST",
            "message": "checkOut must be after checkIn"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid request parameters
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": "UNAUTHORIZED",
            "message": "Bearer token is missing or expired"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Missing or invalid OAuth2 token
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "NOT_FOUND",
            "message": "No reservation found for the provided confirmation number"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": [
              "string",
              "string"
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Modification not permitted under current rate plan or reservation status
