type: http
name: Retrieve reservation
url: '{{baseUrl}}/reservations/:confirmationNumber'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: confirmationNumber
    value: HOTEL-2026-884421
    description: Reservation confirmation number returned at booking time.
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "confirmationNumber": "string",
            "status": "CANCELLED",
            "propertyId": "string",
            "roomTypeCode": "string",
            "checkIn": "1967-05-10",
            "checkOut": "1999-02-03",
            "totalDue": 2623.2100020077078,
            "createdAt": "1992-05-27T15:46:20.575Z",
            "modifiedAt": "1964-09-02T10:13:34.545Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Reservation retrieved successfully
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": "UNAUTHORIZED",
            "message": "Bearer token is missing or expired"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Missing or invalid OAuth2 token
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "NOT_FOUND",
            "message": "No reservation found for the provided confirmation number"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found
