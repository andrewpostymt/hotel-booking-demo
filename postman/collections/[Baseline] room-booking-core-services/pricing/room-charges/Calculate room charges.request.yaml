type: http
name: Calculate room charges
url: '{{baseUrl}}/pricing/room-charges'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "propertyId": "GRAND-HOTEL-LV",
      "roomTypeCode": "DELUXE-KING",
      "ratePlanCode": "FLEX_RACK",
      "checkIn": "2026-06-01",
      "checkOut": "2026-06-03",
      "guests": {
        "adults": 2,
        "children": 0
      },
      "addOns": [
        {
          "code": "RESORT-FEE"
        },
        {
          "code": "EARLY-CHECKIN"
        }
      ]
    }
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "propertyId": "GRAND-HOTEL-LV",
            "roomTypeCode": "DELUXE-KING",
            "nights": 2,
            "lineItems": [
              {
                "description": "Deluxe King Room - Night 1",
                "amount": 219
              },
              {
                "description": "Deluxe King Room - Night 2",
                "amount": 219
              },
              {
                "description": "Resort Fee (2 nights)",
                "amount": 79
              },
              {
                "description": "Early Check-In",
                "amount": 50
              }
            ],
            "subtotal": 567,
            "taxAmount": 85.05,
            "totalDue": 652.05,
            "currency": "USD"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Room charges calculated successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "INVALID_REQUEST",
            "message": "checkOut must be after checkIn"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid request parameters
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": "UNAUTHORIZED",
            "message": "Bearer token is missing or expired"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Missing or invalid OAuth2 token
  - response:
      statusCode: 422
      statusText: Unprocessable Entity (WebDAV) (RFC 4918)
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": [
              "string",
              "string"
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Request is well-formed but cannot be processed
