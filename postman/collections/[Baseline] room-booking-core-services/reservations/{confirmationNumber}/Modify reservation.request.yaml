type: http
name: Modify reservation
url: '{{baseUrl}}/reservations/:confirmationNumber'
method: PUT
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: confirmationNumber
    value: HOTEL-2026-884421
    description: Reservation confirmation number returned at booking time.
body:
  type: json
  content: |-
    {
      "checkIn": "2023-12-30",
      "checkOut": "1947-10-07",
      "roomTypeCode": "string",
      "guests": {
        "adults": 4142,
        "children": 8786
      },
      "addOns": [
        {
          "code": "RESORT-FEE",
          "description": "string",
          "amount": 5927.478739764249
        },
        {
          "code": "RESORT-FEE",
          "description": "string",
          "amount": 1390.396225651922
        }
      ],
      "specialRequests": "string"
    }
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "confirmationNumber": "string",
            "status": "MODIFIED",
            "propertyId": "string",
            "roomTypeCode": "string",
            "checkIn": "1978-11-09",
            "checkOut": "2012-07-07",
            "totalDue": 9923.57349578079,
            "createdAt": "1999-05-21T14:33:04.758Z",
            "modifiedAt": "1958-09-07T13:09:28.647Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Reservation modified successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "INVALID_REQUEST",
            "message": "checkOut must be after checkIn"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid request parameters
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": "UNAUTHORIZED",
            "message": "Bearer token is missing or expired"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Missing or invalid OAuth2 token
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "NOT_FOUND",
            "message": "No reservation found for the provided confirmation number"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": [
              "string",
              "string"
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Modification not permitted under current rate plan or reservation status
