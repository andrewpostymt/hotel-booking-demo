type: http
name: Modify reservation
url: '{{baseUrl}}/reservations/:confirmationNumber'
method: PUT
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: confirmationNumber
    value: HOTEL-2026-884421
    description: Reservation confirmation number returned at booking time.
body:
  type: json
  content: |-
    {
      "checkIn": "1988-06-27",
      "checkOut": "2024-02-19",
      "roomTypeCode": "string",
      "guests": {
        "adults": 3546,
        "children": 1546
      },
      "addOns": [
        {
          "code": "RESORT-FEE",
          "description": "string",
          "amount": 6536.807290559947
        },
        {
          "code": "RESORT-FEE",
          "description": "string",
          "amount": 295.1415176726857
        }
      ],
      "specialRequests": "string"
    }
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "confirmationNumber": "string",
            "status": "MODIFIED",
            "propertyId": "string",
            "roomTypeCode": "string",
            "checkIn": "1980-08-12",
            "checkOut": "1994-07-06",
            "totalDue": 4939.726148851698,
            "createdAt": "1987-10-15T08:33:45.935Z",
            "modifiedAt": "2025-10-17T05:16:37.978Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Reservation modified successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "INVALID_REQUEST",
            "message": "checkOut must be after checkIn"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid request parameters
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": "UNAUTHORIZED",
            "message": "Bearer token is missing or expired"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Missing or invalid OAuth2 token
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "NOT_FOUND",
            "message": "No reservation found for the provided confirmation number"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": [
              "string",
              "string"
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Modification not permitted under current rate plan or reservation status
