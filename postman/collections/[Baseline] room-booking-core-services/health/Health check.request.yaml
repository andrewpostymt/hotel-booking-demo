$kind: http-request
url: '{{baseUrl}}/health'
method: GET
headers:
  Accept: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "status": "UP",
            "version": "3.0.0",
            "timestamp": "2026-04-29T14:00:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Service is healthy
