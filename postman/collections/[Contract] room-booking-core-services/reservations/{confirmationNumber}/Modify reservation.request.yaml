type: http
name: Modify reservation
url: '{{baseUrl}}/reservations/:confirmationNumber'
method: PUT
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: confirmationNumber
    value: HOTEL-2026-884421
    description: Reservation confirmation number returned at booking time.
body:
  type: json
  content: |-
    {
      "checkIn": "1973-04-18",
      "checkOut": "1963-11-05",
      "roomTypeCode": "string",
      "guests": {
        "adults": 616,
        "children": 6271
      },
      "addOns": [
        {
          "code": "RESORT-FEE",
          "description": "string",
          "amount": 4248.788736052087
        },
        {
          "code": "RESORT-FEE",
          "description": "string",
          "amount": 2931.3667406900645
        }
      ],
      "specialRequests": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Contract] Auto-generated contract test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
      - pm.test('Content-Type is application/json', function () {
      - '    if (pm.response.code !== 204) {'
      - '        pm.response.to.have.header(''Content-Type'');'
      - '        pm.expect(pm.response.headers.get(''Content-Type'')).to.include(''application/json'');'
      - '    }'
      - '});'
      - pm.test('Response is valid JSON', function () {
      - '    if (pm.response.code !== 204) {'
      - '        pm.response.to.be.json;'
      - '    }'
      - '});'
      - // Validate required fields from response schema
      - pm.test('Required fields are present', function () {
      - '    if (pm.response.code === 204) return;'
      - '    var jsonData = pm.response.json();'
      - '    pm.expect(jsonData).to.be.an(''object'');'
      - '    var keys = Object.keys(jsonData);'
      - '    if (keys.length === 1 && Array.isArray(jsonData[keys[0]])) {'
      - '        pm.expect(jsonData[keys[0]]).to.be.an(''array'');'
      - '    }'
      - '});'
      - // Validate response field types (non-null required fields)
      - pm.test('Field types are correct', function () {
      - '    if (pm.response.code === 204) return;'
      - '    var jsonData = pm.response.json();'
      - '    Object.keys(jsonData).forEach(function(key) {'
      - '        pm.expect(jsonData[key]).to.not.be.undefined;'
      - '    });'
      - '});'
      - (function() {
      - '    var status = pm.response.code;'
      - '    if (status === 204) return; '
      - '    try {'
      - '        var body = pm.response.json();'
      - '        pm.test(''Response body matches expected structure'', function () {'
      - '            pm.expect(typeof body).to.equal(''object'');'
      - '            if (status >= 400) {'
      - '                pm.expect(body).to.have.property(''error'');'
      - '                pm.expect(body).to.have.property(''message'');'
      - '            }'
      - '        });'
      - '    } catch (e) {}'
      - '})();'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "confirmationNumber": "string",
            "status": "CANCELLED",
            "propertyId": "string",
            "roomTypeCode": "string",
            "checkIn": "1990-09-24",
            "checkOut": "2004-04-16",
            "totalDue": 227.51796549250525,
            "createdAt": "1987-04-28T19:00:28.988Z",
            "modifiedAt": "2022-09-24T19:27:10.088Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Reservation modified successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "INVALID_REQUEST",
            "message": "checkOut must be after checkIn"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid request parameters
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": "UNAUTHORIZED",
            "message": "Bearer token is missing or expired"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Missing or invalid OAuth2 token
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "NOT_FOUND",
            "message": "No reservation found for the provided confirmation number"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": [
              "string",
              "string"
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Modification not permitted under current rate plan or reservation status
