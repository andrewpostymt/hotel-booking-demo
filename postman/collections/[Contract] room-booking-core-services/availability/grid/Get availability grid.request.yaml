$kind: http-request
name: Get availability grid
url: '{{baseUrl}}/availability/grid?checkIn=2026-06-01&checkOut=2026-06-03&adults=2&propertyIds=GRAND-HOTEL-LV,PALACE-HOTEL-LV,SUMMIT-HOTEL-LV'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: checkIn
    value: '2026-06-01'
    description: Check-in date in YYYY-MM-DD format.
  - key: checkOut
    value: '2026-06-03'
    description: Check-out date in YYYY-MM-DD format. Must be after checkIn.
  - key: adults
    value: '2'
    description: Number of adult guests.
  - key: propertyIds
    value: GRAND-HOTEL-LV,PALACE-HOTEL-LV,SUMMIT-HOTEL-LV
    description: Comma-separated list of property IDs to include in the grid.
scripts:
  - type: afterResponse
    code:
      - // [Contract] Auto-generated contract test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
      - pm.test('Content-Type is application/json', function () {
      - '    if (pm.response.code !== 204) {'
      - '        pm.response.to.have.header(''Content-Type'');'
      - '        pm.expect(pm.response.headers.get(''Content-Type'')).to.include(''application/json'');'
      - '    }'
      - '});'
      - pm.test('Response is valid JSON', function () {
      - '    if (pm.response.code !== 204) {'
      - '        pm.response.to.be.json;'
      - '    }'
      - '});'
      - // Validate required fields from response schema
      - pm.test('Required fields are present', function () {
      - '    if (pm.response.code === 204) return;'
      - '    var jsonData = pm.response.json();'
      - '    pm.expect(jsonData).to.be.an(''object'');'
      - '    var keys = Object.keys(jsonData);'
      - '    if (keys.length === 1 && Array.isArray(jsonData[keys[0]])) {'
      - '        pm.expect(jsonData[keys[0]]).to.be.an(''array'');'
      - '    }'
      - '});'
      - // Validate response field types (non-null required fields)
      - pm.test('Field types are correct', function () {
      - '    if (pm.response.code === 204) return;'
      - '    var jsonData = pm.response.json();'
      - '    Object.keys(jsonData).forEach(function(key) {'
      - '        pm.expect(jsonData[key]).to.not.be.undefined;'
      - '    });'
      - '});'
      - (function() {
      - '    var status = pm.response.code;'
      - '    if (status === 204) return; '
      - '    try {'
      - '        var body = pm.response.json();'
      - '        pm.test(''Response body matches expected structure'', function () {'
      - '            pm.expect(typeof body).to.equal(''object'');'
      - '            if (status >= 400) {'
      - '                pm.expect(body).to.have.property(''error'');'
      - '                pm.expect(body).to.have.property(''message'');'
      - '            }'
      - '        });'
      - '    } catch (e) {}'
      - '})();'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "checkIn": "2026-06-01",
            "checkOut": "2026-06-03",
            "grid": [
              {
                "propertyId": "GRAND-HOTEL-LV",
                "propertyName": "Grand Hotel Las Vegas",
                "lowestNightlyRate": 189,
                "available": true
              },
              {
                "propertyId": "PALACE-HOTEL-LV",
                "propertyName": "Bellagio",
                "lowestNightlyRate": 329,
                "available": true
              },
              {
                "propertyId": "SUMMIT-HOTEL-LV",
                "propertyName": "ARIA Resort & Casino",
                "lowestNightlyRate": 259,
                "available": false
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Availability grid returned successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "INVALID_REQUEST",
            "message": "checkOut must be after checkIn"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid request parameters
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": "UNAUTHORIZED",
            "message": "Bearer token is missing or expired"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Missing or invalid OAuth2 token
