$kind: http-request
name: GET /availability/calendar — Invalid Date Range (400)
url: "{{baseUrl}}/availability/calendar?propertyId=GRAND-HOTEL-LV&checkIn=2026-06-05&checkOut=2026-06-01&adults=2"
method: GET
description: |-
  Negative test: submits a date range where `checkIn` (2026-06-05) is after `checkOut` (2026-06-01). Expects a 400 Bad Request response with `code` and `message` fields in the body. Validates that the API correctly rejects logically invalid date ranges. Response time must be under 2000ms.
headers:
  Authorization: Bearer {{accessToken}}
queryParams:
  propertyId: GRAND-HOTEL-LV
  checkIn: '2026-06-05'
  checkOut: '2026-06-01'
  adults: "2"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response has code field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("code");
      });

      pm.test("Response has message field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
          pm.expect(json.message).to.be.a("string").and.not.empty;
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
examples: ./.resources/GET -availability-calendar — Invalid Date Range (400).resources/examples
order: 3000
