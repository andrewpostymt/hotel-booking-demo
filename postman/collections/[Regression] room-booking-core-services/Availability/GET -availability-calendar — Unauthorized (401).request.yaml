$kind: http-request
name: GET /availability/calendar — Unauthorized (401)
url: "{{baseUrl}}/availability/calendar?propertyId=GRAND-HOTEL-LV&checkIn=2026-06-01&checkOut=2026-06-03&adults=2"
method: GET
description: |-
  Negative test: sends the request with an empty `Authorization` header. Expects a 401 Unauthorized response with `code` and `message` fields. Validates that the endpoint enforces authentication and returns a well-formed error body when credentials are absent. Response time must be under 2000ms.
headers:
  Authorization: ""
queryParams:
  propertyId: GRAND-HOTEL-LV
  checkIn: '2026-06-01'
  checkOut: '2026-06-03'
  adults: "2"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 401", function () {
          pm.response.to.have.status(401);
      });

      pm.test("Response has code and message", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("code");
          pm.expect(json).to.have.property("message");
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
examples: ./.resources/GET -availability-calendar — Unauthorized (401).resources/examples
order: 4000
