$kind: http-example
request:
  url: "{{baseUrl}}/pricing/room-charges"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "propertyId": "GRAND-HOTEL-LV"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"error":"VALIDATION_ERROR","message":"Required fields are missing","details":{"missingFields":["propertyId","checkIn","checkOut","roomTypeCode"]}}'
order: 1000
