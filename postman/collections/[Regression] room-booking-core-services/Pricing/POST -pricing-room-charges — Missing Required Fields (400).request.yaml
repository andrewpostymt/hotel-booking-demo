$kind: http-request
name: POST /pricing/room-charges — Missing Required Fields (400)
url: "{{baseUrl}}/pricing/room-charges"
method: POST
description: |-
  Negative test: submits a room-charges request with only `propertyId` in the body, omitting all other required fields (roomTypeCode, ratePlanCode, checkIn, checkOut, guests). Expects a 400 Bad Request with `code` and `message` fields. Validates that the API enforces required field validation and returns a descriptive error. Response time must be under 2000ms.
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "propertyId": "GRAND-HOTEL-LV"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response has code and message", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("code");
          pm.expect(json).to.have.property("message");
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
examples: ./.resources/POST -pricing-room-charges — Missing Required Fields (400).resources/examples
order: 6000
