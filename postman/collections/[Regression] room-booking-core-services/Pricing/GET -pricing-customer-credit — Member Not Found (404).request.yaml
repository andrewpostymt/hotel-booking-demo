$kind: http-request
name: GET /pricing/customer-credit — Member Not Found (404)
url: "{{baseUrl}}/pricing/customer-credit?propertyId=GRAND-HOTEL-LV&checkIn=2026-06-01&checkOut=2026-06-03&mlifeNumber=MLF-NONEXISTENT-99999"
method: GET
description: |-
  Negative test: requests credit eligibility for a non-existent loyalty member (`MLF-NONEXISTENT-99999`). Expects a 404 Not Found response with `code` and `message` fields. Validates that the API returns a well-formed error when the loyalty member cannot be located. Response time must be under 2000ms.
headers:
  Authorization: Bearer {{accessToken}}
queryParams:
  propertyId: GRAND-HOTEL-LV
  checkIn: '2026-06-01'
  checkOut: '2026-06-03'
  mlifeNumber: MLF-NONEXISTENT-99999
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 404", function () {
          pm.response.to.have.status(404);
      });

      pm.test("Response has code and message", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("code");
          pm.expect(json).to.have.property("message");
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
examples: ./.resources/GET -pricing-customer-credit — Member Not Found (404).resources/examples
order: 2000
