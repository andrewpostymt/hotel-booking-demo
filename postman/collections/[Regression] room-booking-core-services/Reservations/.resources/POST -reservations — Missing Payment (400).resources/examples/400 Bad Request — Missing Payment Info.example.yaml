$kind: http-example
request:
  url: "{{baseUrl}}/reservations"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "propertyId": "GRAND-HOTEL-LV",
        "roomTypeCode": "DELUXE-KING",
        "ratePlanCode": "FLEX_RACK",
        "checkIn": "2026-06-01",
        "checkOut": "2026-06-03",
        "guests": {
          "adults": 2
        }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"error":"VALIDATION_ERROR","message":"Payment information is required to complete the reservation","details":{"missingFields":["paymentMethod","cardNumber","cardExpiry"]}}'
order: 1000
