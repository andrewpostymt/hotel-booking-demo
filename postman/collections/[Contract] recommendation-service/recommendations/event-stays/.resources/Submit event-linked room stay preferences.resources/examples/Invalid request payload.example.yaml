$kind: http-example
request:
  url: "{{baseUrl}}/recommendations/event-stays"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  body:
    type: json
    content: |-
      {
        "eventId": "EVT-BM-DOLBY-2026",
        "eventName": "Bruno Mars at Dolby Live",
        "propertyCode": "ARIA",
        "preferredCheckIn": "2026-05-15",
        "preferredCheckOut": "2026-05-17",
        "roomCount": 1,
        "guestCount": 2,
        "orderId": null
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "code": "VALIDATION_ERROR",
        "message": "orderId is required",
        "detail": "Query parameter 'orderId' must be provided",
        "traceId": "trace-00124857-abc"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "code": {
            "type": "string",
            "example": "VALIDATION_ERROR",
            "description": "Machine-readable error code"
          },
          "message": {
            "type": "string",
            "example": "orderId is required",
            "description": "Human-readable error summary"
          },
          "detail": {
            "type": "string",
            "example": "Query parameter 'orderId' must be provided",
            "description": "Extended error detail for debugging"
          },
          "traceId": {
            "type": "string",
            "example": "trace-00124857-abc",
            "description": "Distributed trace ID for log correlation"
          }
        },
        "required": [
          "code",
          "message"
        ]
      }
order: 2000
