$kind: http-example
request:
  url: "{{baseUrl}}/recommendations?orderId=ORD-2026-00124857&roomCount=1&stayNights=3&showsOnly=false&propertyCode=ARIA"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <token>
      description: "Added as a part of security scheme: oauth2"
  queryParams:
    - key: orderId
      value: ORD-2026-00124857
      description: Unique identifier of the confirmed booking order
    - key: roomCount
      value: "1"
      description: Number of rooms in the order — influences bundle sizing for recommendations
    - key: stayNights
      value: "3"
      description: Length of stay in nights — drives offer selection logic
    - key: showsOnly
      value: "false"
      description: |
        When true, filters recommendations to entertainment and show offers only.
        Used in the post-booking upsell flow for guests who have not added show tickets.
    - key: propertyCode
      value: ARIA
      description: Hotel property code to scope recommendations to a specific property
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "code": "VALIDATION_ERROR",
        "message": "orderId is required",
        "detail": "Query parameter 'orderId' must be provided",
        "traceId": "trace-00124857-abc"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "code": {
            "type": "string",
            "example": "VALIDATION_ERROR",
            "description": "Machine-readable error code"
          },
          "message": {
            "type": "string",
            "example": "orderId is required",
            "description": "Human-readable error summary"
          },
          "detail": {
            "type": "string",
            "example": "Query parameter 'orderId' must be provided",
            "description": "Extended error detail for debugging"
          },
          "traceId": {
            "type": "string",
            "example": "trace-00124857-abc",
            "description": "Distributed trace ID for log correlation"
          }
        },
        "required": [
          "code",
          "message"
        ]
      }
order: 3000
