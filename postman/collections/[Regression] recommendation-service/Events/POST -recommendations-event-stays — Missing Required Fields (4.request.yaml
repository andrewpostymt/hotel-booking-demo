$kind: http-request
name: POST /recommendations/event-stays — Missing Required Fields (400)
url: "{{baseUrl}}/recommendations/event-stays"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "eventId": "EVT-BM-DOLBY-2026"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response has code field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("code");
      });

      pm.test("Response has message field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
examples: ./.resources/POST -recommendations-event-stays — Missing Required Fields (4.resources/examples
