$kind: http-request
name: POST /auth/token — Invalid Credentials (401)
url: "{{baseUrl}}/auth/token"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    grant_type: client_credentials
    client_id: invalid-client
    client_secret: invalid-secret
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 401", function () {
          pm.response.to.have.status(401);
      });

      pm.test("Response has error code field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("code");
      });

      pm.test("Response has message field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
          pm.expect(json.message).to.be.a("string").and.not.empty;
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
examples: ./.resources/POST -auth-token — Invalid Credentials (401).resources/examples
order: 2000
