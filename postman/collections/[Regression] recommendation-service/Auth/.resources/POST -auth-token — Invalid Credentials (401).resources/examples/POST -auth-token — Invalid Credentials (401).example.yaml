$kind: http-example
name: POST /auth/token — Invalid Credentials (401)
request:
  url: "{{baseUrl}}/auth/token"
  method: POST
  body:
    type: json
    content: ""
response:
  statusCode: 401
  statusText: Unauthorized
  body:
    type: json
    content: '{"code": "INVALID_CREDENTIALS", "message": "The client_id or client_secret provided is invalid."}'
order: 1000
