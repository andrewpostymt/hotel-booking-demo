$kind: http-request
name: GET /recommendations — Single Night Stay
url: "{{baseUrl}}/recommendations?orderId=ORD-2026-00124857&stayNights=1&propertyCode=ARIA"
method: GET
headers:
  Authorization: Bearer {{accessToken}}
queryParams:
  orderId: ORD-2026-00124857
  stayNights: "1"
  propertyCode: ARIA
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response structure is valid", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("orderId");
          pm.expect(json).to.have.property("recommendations");
          pm.expect(json).to.have.property("generatedAt");
          pm.expect(json).to.have.property("totalCount");
      });

      pm.test("Response time is under 3000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(3000);
      });
    language: text/javascript
examples: ./.resources/GET -recommendations — Single Night Stay.resources/examples
order: 6000
