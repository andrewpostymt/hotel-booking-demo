$kind: http-request
name: GET /health — Service Healthy
url: "{{baseUrl}}/health"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has status field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("status");
      });

      pm.test("Status is one of healthy/degraded/unhealthy", function () {
          const json = pm.response.json();
          pm.expect(["healthy", "degraded", "unhealthy"]).to.include(json.status);
      });

      pm.test("Response has timestamp field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("timestamp");
          pm.expect(json.timestamp).to.be.a("string").and.not.empty;
      });

      pm.test("Timestamp is a valid ISO 8601 date-time", function () {
          const json = pm.response.json();
          const date = new Date(json.timestamp);
          pm.expect(date.toString()).to.not.eql("Invalid Date");
      });

      pm.test("Service is healthy (not unhealthy)", function () {
          const json = pm.response.json();
          pm.expect(json.status).to.not.eql("unhealthy");
      });

      pm.test("Response time is under 1000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });

      pm.test("Content-Type is application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });
    language: text/javascript
examples: ./.resources/GET -health — Service Healthy.resources/examples
order: 1000
