$kind: http-request
description: |
  Returns the current configuration state of the recommendation engine,
  including active offer weightings, blackout dates, and property-level
  override flags. Used by the platform team for live configuration inspection.
url: "{{baseUrl}}/recommendations/configuration"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      // [Smoke] Auto-generated test assertions

      pm.test('Status code is successful (2xx)', function () {
          pm.response.to.be.success;
      });

      pm.test('Response time is acceptable', function () {
          var threshold = parseInt(pm.environment.get('RESPONSE_TIME_THRESHOLD') || '2000', 10);
          pm.expect(pm.response.responseTime).to.be.below(threshold);
      });

      pm.test('Response body is not empty', function () {
          if (pm.response.code !== 204) {
              var body = pm.response.text();
              pm.expect(body.length).to.be.above(0);
          }
      });
    language: text/javascript
examples: ./.resources/Retrieve active recommendation engine configuration.resources/examples
order: 1000
