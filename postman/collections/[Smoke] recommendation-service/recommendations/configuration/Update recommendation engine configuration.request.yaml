$kind: http-request
description: |
  Applies configuration overrides to the live recommendation engine.
  Changes take effect within 60 seconds across all instances. Use to adjust
  offer weightings, toggle property-level features, or set blackout windows
  without a deployment.
url: "{{baseUrl}}/recommendations/configuration"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "offerWeights": {
        "entertainment": 0.8,
        "dining": 0.5,
        "resort_package": 0.6
      },
      "blackoutDates": [],
      "propertyOverrides": {
        "ARIA": {
          "showsOnlyEnabled": true
        }
      }
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "offerWeights": {
          "type": "object",
          "properties": {
            "entertainment": {
              "type": "number",
              "minimum": 0,
              "maximum": 1,
              "format": "float"
            },
            "dining": {
              "type": "number",
              "minimum": 0,
              "maximum": 1,
              "format": "float"
            },
            "resort_package": {
              "type": "number",
              "minimum": 0,
              "maximum": 1,
              "format": "float"
            }
          }
        },
        "blackoutDates": {
          "type": "array",
          "items": {
            "type": "string",
            "format": "date"
          }
        },
        "propertyOverrides": {
          "type": "object"
        }
      }
    }
scripts:
  - type: afterResponse
    code: |-
      // [Smoke] Auto-generated test assertions

      pm.test('Status code is successful (2xx)', function () {
          pm.response.to.be.success;
      });

      pm.test('Response time is acceptable', function () {
          var threshold = parseInt(pm.environment.get('RESPONSE_TIME_THRESHOLD') || '2000', 10);
          pm.expect(pm.response.responseTime).to.be.below(threshold);
      });

      pm.test('Response body is not empty', function () {
          if (pm.response.code !== 204) {
              var body = pm.response.text();
              pm.expect(body.length).to.be.above(0);
          }
      });
    language: text/javascript
examples: ./.resources/Update recommendation engine configuration.resources/examples
order: 2000
