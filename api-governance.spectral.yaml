extends:
  - spectral:oas

# Hotel Booking API — Governance Ruleset
# Targeting confirmed gaps from April 2026 discovery:
#   - Endpoints missing descriptions (visible in Swagger UI — Confluence page showed blank fields)
#   - Response schemas not defined on several endpoints
#   - No examples on 200 responses (blocks mock server generation)
#   - No x-api-owner tag (blocks PAN catalog attribution and team routing)
#   - HTTP servers present in some service configs (should be HTTPS-only across all 9 Apigee tiers)
#
# Usage: npx @stoplight/spectral-cli lint <spec-file> --ruleset api-governance.spectral.yaml

rules:
  # ─────────────────────────────────────────────────────────────────────────────
  # ERRORS — These block merge / CI gate
  # ─────────────────────────────────────────────────────────────────────────────

  operation-description-required:
    message: >
      Operation '{{property}}' is missing a description. Every operation must have a
      description for Postman API Network display and for AI-assisted test generation
      to produce accurate test cases.
    description: |
      All operations must include a non-empty 'description' field.
      One-line 'summary' values are not sufficient — descriptions provide the
      context that powers PAN catalog search and Agent Mode test generation.
    severity: error
    given: "$.paths[*][get,post,put,patch,delete,options,head]"
    then:
      - field: description
        function: truthy

  no-http-servers:
    message: >
      Server URL '{{value}}' uses HTTP. All API gateway servers must use HTTPS.
      All API gateway tiers require TLS — HTTP is not permitted in any environment.
    description: |
      HTTP server URLs are not permitted. This rule enforces HTTPS across all
      environment tiers including local dev tunnels.
    severity: error
    given: "$.servers[*].url"
    then:
      function: pattern
      functionOptions:
        notMatch: "^http:"

  # ─────────────────────────────────────────────────────────────────────────────
  # WARNINGS — These surface in Postman lint output but do not block merge
  # ─────────────────────────────────────────────────────────────────────────────

  response-schema-defined:
    message: >
      Operation '{{property}}' is missing a response schema for the 2xx response.
      Without a schema, the [Contract] collection cannot generate schema-validation
      assertions and mock server responses will be untyped.
    description: |
      All successful (2xx) responses must reference a named schema via $ref or
      define an inline schema. This enables:
        - Contract collection schema-validation test generation
        - Typed mock server responses for inventory-safe testing
        - PAN schema documentation surfaced to API consumers
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete].responses[?(@property >= '200' && @property < '300')].content[*]"
    then:
      field: schema
      function: truthy

  response-examples-required:
    message: >
      The 200 response for '{{property}}' is missing examples. Examples are required
      for mock server response generation and for Agent Mode to produce realistic test data.
    description: |
      All 200 responses must include at least one example. Examples feed the Postman
      mock server so teams can run unlimited tests against fake inventory-safe data.
      They also enable Agent Mode to generate accurate test assertions.
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete].responses['200'].content[*]"
    then:
      field: examples
      function: truthy

  operation-owner-required:
    message: >
      Operation '{{property}}' is missing the 'x-api-owner' extension.
      This field is required for PAN catalog attribution and for routing support
      requests to the correct team in ServiceNow.
    description: |
      All operations must include an 'x-api-owner' extension identifying the owning
      team. Valid values include: booking-services, platform-team, integrations-team.
      This maps to Postman API Network catalog metadata and drives team-level
      governance reporting in the Postman dashboard.
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: x-api-owner
      function: truthy

  info-contact-required:
    message: >
      The API spec is missing the 'info.contact' block. Contact information is
      required for PAN consumer-to-producer routing and for automated incident
      notification from monitor alerts.
    description: |
      The info.contact block must include at least a name and email address.
      This is surfaced in the PAN catalog entry and used by Postman monitors
      to route alert notifications to the correct team.
    severity: warn
    given: "$.info"
    then:
      field: contact
      function: truthy

  parameter-description-required:
    message: >
      Parameter '{{property}}' is missing a description. All path and query parameters
      must be documented for PAN display and for Agent Mode parameter inference.
    description: |
      All parameters (path, query, header) must include a description.
      Undescribed parameters prevent Agent Mode from correctly filling parameter
      values during AI-assisted test generation and degrade PAN documentation quality.
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete].parameters[*]"
    then:
      field: description
      function: truthy

  schema-properties-described:
    message: >
      Schema property '{{property}}' in '{{path}}' is missing a description.
      Schema property descriptions are surfaced in PAN documentation and used
      by Agent Mode to generate accurate field-level test assertions.
    description: |
      All named schema properties should include a description field.
      This is a warn-level rule — apply progressively as schemas mature.
    severity: warn
    given: "$.components.schemas[*].properties[*]"
    then:
      field: description
      function: truthy

  tags-required:
    message: >
      Operation '{{property}}' has no tags. All operations must be tagged for
      correct grouping in PAN documentation and for collection-level organization
      in the generated [Baseline] collection.
    description: |
      Tags drive how Postman organizes generated collections and PAN documentation.
      Operations without tags will be grouped under a default catch-all folder,
      which loses the domain-level structure visible in the 'before' workspace.
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: tags
      function: truthy
