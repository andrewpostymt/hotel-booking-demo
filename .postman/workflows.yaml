# This is a Workflow metadata file for defining entity relationships in this workspace.
# Each workflow defines relations between entities and may include optional behavior/settings.
# The Paths are relative to the .postman directory (avoid absolute paths).
# Keep relation entries explicit and avoid duplicate pairs within the same workflow.
# This file is declarative metadata and does not execute workflows by itself.
workflows:
  syncSpecToCollection:
    - spec: ../index.yaml
      collection: '../postman/collections/[Baseline] room-booking-core-services'
      options:
        syncExamples: true
        includeWebhooks: true
    - spec: ../index.yaml
      collection: '../postman/collections/[Smoke] room-booking-core-services'
      options:
        syncExamples: true
        includeWebhooks: true
    - spec: ../index.yaml
      collection: '../postman/collections/[Contract] room-booking-core-services'
      options:
        syncExamples: true
        includeWebhooks: true
    - spec: ../index.yaml
      collection: '../postman/collections/[Baseline] recommendation-service'
      options:
        syncExamples: true
        includeWebhooks: true
    - spec: ../index.yaml
      collection: '../postman/collections/[Smoke] recommendation-service'
      options:
        syncExamples: true
        includeWebhooks: true
    - spec: ../index.yaml
      collection: '../postman/collections/[Contract] recommendation-service'
      options:
        syncExamples: true
        includeWebhooks: true
